webdav:
  base_url: "https://example.com/webdav"
  books_path: "/books"
  username_env: "WEBDAV_USERNAME"
  password_env: "WEBDAV_PASSWORD"

pipeline:
  require_epubcheck: true
  keep_runs: true
  output_profile: "koreader"
  language: "zh"

update_policy:
  default: "append-safe"
  chapter_fingerprint_threshold: 0.98
  block_on_chapter_count_decrease: true
  block_on_reordered_existing_chapters: true

asset_enrichment:
  mode: "balanced"
  auto_cover_min_confidence: 0.85
  auto_insert_illustration_min_confidence: 0.92
  require_source_url: true
  preserve_original_images: true

metadata_enrichment:
  mode: "aggressive"
  auto_apply_min_confidence: 0.86
  require_evidence_url: true
  allow_single_source_fields: true
  block_on_conflicting_identity: true
  preserve_target_path: true
  preserve_canonical_id: true
  write_epub_metadata: true
  write_cover: true
  write_description: true
  write_subjects: true

koreader:
  metadata_location: "book_folder"
  aggressive_metadata_requires_stable_path: true
  hashdocsettings_policy: "block"

text_cleaning:
  mode: "report-only"
  max_input_chars: 120000
  chars_per_token: 2.0
  max_estimated_cost_cny: 1.0
  light_model_cny_per_1k_tokens: 0.002
  selected_route: "rules-first-report-only"
  escalation_route: "manual-gpt-5.5-review"
  long_context_route: "manual-deepseek-long-context"
  enable_model_calls: false
